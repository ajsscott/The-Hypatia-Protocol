name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python and sync deps
        run: |
          uv python install 3.11
          uv sync --all-extras --dev

      - name: Validate JSON integrity
        run: |
          echo "Validating JSON integrity..."
          failed=0
          for f in $(find . -name "*.json" -not -path "./.git/*" -not -path "./.venv/*"); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "✗ $f"
              failed=1
            else
              echo "✓ $f"
            fi
          done
          exit $failed

      - name: Validate intelligence-store schemas
        run: uv run python scripts/validate-schemas.py

      - name: Check keyword-map drift
        run: uv run python scripts/check-keyword-drift.py

      - name: Run script-level tests
        run: uv run pytest tests/ -v

      - name: Run vectorstore tests
        run: uv run pytest hypatia-kb/vectorstore/tests/ -v
