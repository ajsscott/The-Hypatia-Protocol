# Hypatia Goose custom-distro configuration.
#
# Loaded by Goose at startup when GOOSE_CONFIG_PATH points at this file.
# The exact schema is per Goose version; verify against `goose configure`
# output and ~/.config/goose/config.yaml after install (see README).

# ─────────────────────────────────────────────────────────────────
# Provider configuration — LLM backend
# ─────────────────────────────────────────────────────────────────
#
# Q-02 / Q-21 constraint: Hypatia is LLM-agnostic. Ollama is the
# canonical local provider. Cloud providers (Anthropic, OpenAI) are
# supported via Goose's provider abstraction for testing only — not
# for production curation work.

provider: ollama

providers:
  ollama:
    # Force IPv4 explicitly to avoid the ::1 / 127.0.0.1 binding mismatch
    # we hit during Phase 1 Roo Code testing.
    base_url: "http://127.0.0.1:11434"
    # Model TBD per Q-17 re-evaluation. Phase 1.5 Week 2 task.
    # Candidates: gemma4 (8B, native 128K context, function-calling),
    # qwen2.5-coder:14b (proven tool-use, no thinking mode),
    # qwen3-coder:30b (agentic flagship, 256K context),
    # devstral:24b (Mistral agentic-tuned).
    model: "gemma4"
    # qwen2.5-coder:14b has trained 32K. gemma4 has native 128K. Set
    # this generously; compact kernel + tools + history typically ~15K.
    context_length: 65536
    # Goose's Ollama integration historically used a low default; force
    # explicit higher value to avoid issue #1253.

  # Optional cloud fallback. Comment out if not used.
  # anthropic:
  #   api_key: ${ANTHROPIC_API_KEY}
  #   model: claude-sonnet-4-6

# ─────────────────────────────────────────────────────────────────
# System prompt / persona
# ─────────────────────────────────────────────────────────────────
#
# The compact always-loaded kernel (Q-33 redistribution). Goose loads
# this as the system prompt for every Hypatia session.
#
# Regenerated by goose-config/regen-system-prompt.sh on every change
# to kernel/01-04.md.

system_prompt_file: ./system-prompt.md

# Alternative if Goose expects inline content:
# system_prompt: |
#   <contents of kernel/01-04.md concatenated>

# ─────────────────────────────────────────────────────────────────
# Extensions (MCP servers)
# ─────────────────────────────────────────────────────────────────
#
# Each entry registers an MCP server with Goose. Goose's MCP host
# discovers tools + resources from each on startup.

extensions:
  # Hypatia's own protocol library — serves the 20 cluster/cross-cutting
  # protocols + 10 kernel-archive detail expansions as MCP resources.
  hypatia-protocols:
    type: stdio
    enabled: true
    command: ./target/release/hypatia-protocols-mcp
    env:
      HYPATIA_REPO_ROOT: ${HYPATIA_REPO_ROOT}
    description: "Hypatia's protocol library + kernel-archive resources"

  # Standard filesystem MCP server (from MCP reference servers).
  # Bounded to the repo root + vault dir; Hypatia uses this for read/write.
  filesystem:
    type: stdio
    enabled: true
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "${HYPATIA_REPO_ROOT}", "${VAULT_PATH:/Users/ajsscott/GitHub/TabulaJacqueliana}"]
    description: "Bounded filesystem access for vault + repo"

  # Time / date utility (vanilla MCP utility; Hypatia uses for timestamps).
  time:
    type: stdio
    enabled: true
    command: uvx
    args: ["mcp-server-time"]
    description: "Current time / timezone utility"

  # Phase 2 placeholders (built later):
  # vault-rw:
  #   type: stdio
  #   command: ./target/release/hypatia-vault-rw-mcp
  #   enabled: false
  # save-session:
  #   type: stdio
  #   command: ./target/release/hypatia-save-session-mcp
  #   enabled: false
  # screen-watcher:
  #   type: stdio
  #   command: ./target/release/hypatia-screen-mcp
  #   enabled: false

# ─────────────────────────────────────────────────────────────────
# Session defaults
# ─────────────────────────────────────────────────────────────────

session:
  # Hypatia greets with the Alexandrian-register opener defined in kernel.
  greeting: ""  # let the persona produce its own greeting per kernel/01-identity

  # Conversation history retention; Goose handles compaction.
  max_history_turns: 50

  # Hypatia is curation-focused, not autonomous task completion. Goose's
  # auto-execution should respect Hypatia's classification + Tier rules.
  auto_execute: false  # Hypatia confirms before destructive actions per kernel/03

# ─────────────────────────────────────────────────────────────────
# Hints file
# ─────────────────────────────────────────────────────────────────

hints_file: ./goosehints.md
